<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Balance Reconciler</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f4f6f9;
      color: #1a1a2e;
      min-height: 100vh;
      padding: 40px 24px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 32px;
      text-align: center;
    }

    h2 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 12px;
      color: #374151;
    }

    .drop-row {
      display: flex;
      gap: 16px;
      max-width: 860px;
      margin: 0 auto 32px;
    }

    .drop-zone {
      flex: 1;
      border: 2px dashed #b0b8c9;
      border-radius: 12px;
      padding: 32px 16px;
      text-align: center;
      cursor: pointer;
      background: #fff;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }

    .drop-zone.over  { border-color: #4f8ef7; background: #eef3ff; }
    .drop-zone.loaded { border-color: #34c759; background: #f0faf3; }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .drop-icon  { font-size: 2rem; margin-bottom: 8px; }
    .drop-label { font-weight: 600; font-size: 0.95rem; margin-bottom: 4px; }
    .drop-hint  { font-size: 0.8rem; color: #6b7280; }
    .drop-filename { margin-top: 8px; font-size: 0.8rem; font-weight: 600; color: #34c759; min-height: 1.2em; }

    .run-btn {
      display: block;
      margin: 0 auto 40px;
      padding: 12px 36px;
      background: #4f8ef7;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }

    .run-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .run-btn:not(:disabled):hover { background: #3a78e0; }

    #report { max-width: 860px; margin: 0 auto; display: flex; flex-direction: column; gap: 24px; }

    /* Status banner */
    .banner {
      text-align: center;
      font-size: 1.1rem;
      font-weight: 700;
      padding: 14px;
      border-radius: 10px;
    }
    .banner.ok   { background: #d1fae5; color: #065f46; }
    .banner.fail { background: #fee2e2; color: #991b1b; }

    /* Summary cards */
    .cards {
      display: flex;
      gap: 16px;
    }

    .card {
      flex: 1;
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
      text-align: center;
    }

    .card-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #6b7280;
      margin-bottom: 8px;
    }

    .card-value {
      font-size: 1.4rem;
      font-weight: 700;
    }

    .card-value.positive { color: #065f46; }
    .card-value.negative { color: #991b1b; }
    .card-value.neutral  { color: #1a1a2e; }

    /* Shared table styles */
    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
    }

    thead tr { background: #1a1a2e; color: #fff; }
    th, td { padding: 12px 16px; text-align: right; font-size: 0.9rem; }
    th:first-child, td:first-child { text-align: left; }

    /* Episode table */
    .gap-resolved   { background: #d1fae5; color: #065f46; }
    .gap-unresolved { background: #fee2e2; color: #991b1b; }

    /* Row-by-row log */
    tbody tr.match    { background: #d1fae5; color: #065f46; }
    tbody tr.mismatch { background: #fee2e2; color: #991b1b; }
    tbody tr.diverge  { background: #fff7ed; color: #9a3412; }
    tbody tr.no-bank  { background: #fef9c3; color: #713f12; }

    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 99px;
      font-size: 0.75rem;
      font-weight: 700;
    }

    .badge.ok       { background: #34c759; color: #fff; }
    .badge.mismatch { background: #ff3b30; color: #fff; }
    .badge.diverge  { background: #f97316; color: #fff; }
    .badge.no-bank  { background: #f59e0b; color: #fff; }
    .badge.resolved   { background: #34c759; color: #fff; }
    .badge.unresolved { background: #ff3b30; color: #fff; }

    /* Action buttons row */
    .action-row {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .action-btn {
      padding: 8px 20px;
      font-size: 0.85rem;
      font-weight: 600;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .action-btn.download { background: #1a1a2e; color: #fff; }
    .action-btn.download:hover { background: #374151; }
    .action-btn.view-log { background: #e5e7eb; color: #1a1a2e; }
    .action-btn.view-log:hover { background: #d1d5db; }

    .log-section { display: none; }
    .log-section.visible { display: block; }

    .error-msg {
      text-align: center;
      color: #991b1b;
      background: #fee2e2;
      border-radius: 10px;
      padding: 14px;
      font-weight: 600;
    }
  </style>
</head>
<body>

<h1>Balance Reconciler</h1>

<div class="drop-row">
  <div class="drop-zone" id="zone-tx">
    <input type="file" accept=".csv" id="file-tx" />
    <div class="drop-icon">📄</div>
    <div class="drop-label">Transactions CSV</div>
    <div class="drop-hint">Drop file or click to browse</div>
    <div class="drop-filename" id="name-tx"></div>
  </div>

  <div class="drop-zone" id="zone-bank">
    <input type="file" accept=".csv" id="file-bank" />
    <div class="drop-icon">🏦</div>
    <div class="drop-label">Bank Balances CSV</div>
    <div class="drop-hint">Drop file or click to browse</div>
    <div class="drop-filename" id="name-bank"></div>
  </div>
</div>

<button class="run-btn" id="run-btn" disabled>Reconcile</button>

<div id="report"></div>

<script>
  const files = { tx: null, bank: null };

  function setupZone(zoneId, fileId, nameId, key) {
    const zone  = document.getElementById(zoneId);
    const input = document.getElementById(fileId);
    const nameEl = document.getElementById(nameId);

    function loadFile(file) {
      if (!file) return;
      files[key] = file;
      nameEl.textContent = file.name;
      zone.classList.add('loaded');
      checkReady();
    }

    input.addEventListener('change', () => loadFile(input.files[0]));
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('over'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('over'));
    zone.addEventListener('drop', e => {
      e.preventDefault();
      zone.classList.remove('over');
      loadFile(e.dataTransfer.files[0]);
    });
  }

  function checkReady() {
    document.getElementById('run-btn').disabled = !(files.tx && files.bank);
  }

  async function reconcile() {
    const btn = document.getElementById('run-btn');
    btn.disabled = true;
    btn.textContent = 'Running...';

    const form = new FormData();
    form.append('transactions', files.tx);
    form.append('bank_balances', files.bank);

    try {
      const res  = await fetch('/reconcile', { method: 'POST', body: form });
      const data = await res.json();

      if (data.error) {
        document.getElementById('report').innerHTML = `<div class="error-msg">${data.error}</div>`;
        return;
      }

      render(data);
    } catch (e) {
      document.getElementById('report').innerHTML =
        `<div class="error-msg">Could not reach server: ${e.message}</div>`;
    } finally {
      btn.disabled = false;
      btn.textContent = 'Reconcile';
    }
  }

  function fmt(n) {
    return n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function fmtSigned(n) {
    const abs = Math.abs(n);
    return n === 0 ? '$0.00' : (n > 0 ? '+$' : '-$') + fmt(abs);
  }

  function fmtTimestamp(date) {
    return date.toLocaleString('en-US', {
      year: 'numeric', month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
    });
  }

  function triggerDownload(content, filename) {
    const blob = new Blob([content], { type: 'text/csv' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
  }

  function downloadLogCSV(rows, timestamp) {
    const lines = [`Generated: ${timestamp}`, 'Date,Running Balance,Bank Balance,Discrepancy,Status'];
    for (const r of rows) {
      lines.push([
        r.date,
        r.running.toFixed(2),
        r.bank        !== null ? r.bank.toFixed(2)        : '',
        r.discrepancy !== null ? r.discrepancy.toFixed(2) : '',
        r.status
      ].join(','));
    }
    triggerDownload(lines.join('\n'), 'reconciliation_log.csv');
  }

  function downloadGapsCSV(gaps, timestamp) {
    const lines = [`Generated: ${timestamp}`, '#,Started,Resolved,Amount Off,Status'];
    for (const g of gaps) {
      lines.push([
        g.id,
        g.started,
        g.resolved ?? '',
        g.amount.toFixed(2),
        g.resolved ? 'Resolved' : 'Unresolved'
      ].join(','));
    }
    triggerDownload(lines.join('\n'), 'discrepancy_report.csv');
  }

  function render(data) {
    const s = data.summary;
    const timestamp = fmtTimestamp(new Date());

    // Banner
    const bannerClass = data.all_match ? 'ok' : 'fail';
    const bannerText  = data.all_match
      ? 'All dates reconcile.'
      : `${data.mismatch_count} discrepanc${data.mismatch_count === 1 ? 'y' : 'ies'} found.`;

    // Summary cards
    const netClass = s.net_discrepancy === 0 ? 'positive'
                   : s.net_discrepancy > 0   ? 'negative' : 'negative';
    const cards = `
      <div class="cards">
        <div class="card">
          <div class="card-label">Final Running Balance</div>
          <div class="card-value neutral">$${fmt(s.final_running_balance)}</div>
        </div>
        <div class="card">
          <div class="card-label">Final Bank Balance</div>
          <div class="card-value neutral">$${fmt(s.final_bank_balance)}</div>
        </div>
        <div class="card">
          <div class="card-label">Net Discrepancy</div>
          <div class="card-value ${s.net_discrepancy === 0 ? 'positive' : 'negative'}">${fmtSigned(s.net_discrepancy)}</div>
        </div>
      </div>`;

    // Episode table
    const gapRows = s.gaps.length === 0
      ? '<tr><td colspan="5" style="text-align:center;color:#6b7280;padding:20px">No discrepancies detected</td></tr>'
      : s.gaps.map(ep => {
          const resolved  = ep.resolved ?? '—';
          const rowClass  = ep.resolved ? 'gap-resolved' : 'gap-unresolved';
          const badge     = ep.resolved
            ? '<span class="badge resolved">Resolved</span>'
            : '<span class="badge unresolved">Unresolved</span>';
          return `<tr class="${rowClass}">
            <td>${ep.id}</td>
            <td>${ep.started}</td>
            <td>${resolved}</td>
            <td>${fmtSigned(ep.amount)}</td>
            <td>${badge}</td>
          </tr>`;
        }).join('');

    const gapTable = `
      <div>
        <h2>Discrepancy Report</h2>
        <table>
          <thead>
            <tr>
              <th style="text-align:left">#</th>
              <th style="text-align:left">Started</th>
              <th style="text-align:left">Resolved</th>
              <th>Amount Off</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>${gapRows}</tbody>
        </table>
      </div>`;

    // Row-by-row log
    const logRows = data.rows.map(r => {
      if (r.status === 'NO_RECORD') {
        return `<tr class="no-bank">
          <td>${r.date}</td>
          <td>$${fmt(r.running)}</td>
          <td>—</td>
          <td>—</td>
          <td><span class="badge no-bank">NO RECORD</span></td>
        </tr>`;
      }
      const clsMap   = { OK: 'match', MISMATCH: 'mismatch', DIVERGE: 'diverge' };
      const badgeMap = {
        OK:       '<span class="badge ok">OK</span>',
        MISMATCH: '<span class="badge mismatch">MISMATCH</span>',
        DIVERGE:  '<span class="badge diverge">DIVERGE</span>',
      };
      const discStr = r.discrepancy !== 0 ? fmtSigned(r.discrepancy) : '—';
      return `<tr class="${clsMap[r.status]}">
        <td>${r.date}</td>
        <td>$${fmt(r.running)}</td>
        <td>$${fmt(r.bank)}</td>
        <td>${discStr}</td>
        <td>${badgeMap[r.status]}</td>
      </tr>`;
    }).join('');

    const logSection = `
      <div class="log-section" id="log-section">
        <h2>Day-by-Day Log</h2>
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Running Balance</th>
              <th>Bank Balance</th>
              <th>Discrepancy</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>${logRows}</tbody>
        </table>
      </div>`;

    const actionRow = `
      <div class="action-row">
        <span style="font-size:0.78rem;color:#6b7280;align-self:center">Generated: ${timestamp}</span>
        <button class="action-btn download" id="dl-gaps-btn">Download Discrepancy Report</button>
        <button class="action-btn download" id="dl-log-btn">Download Log CSV</button>
        <button class="action-btn view-log" id="view-log-btn">View Log</button>
      </div>`;

    document.getElementById('report').innerHTML =
      `<div class="banner ${bannerClass}">${bannerText}</div>${cards}${actionRow}${gapTable}${logSection}`;

    document.getElementById('dl-gaps-btn').addEventListener('click', () => downloadGapsCSV(data.summary.gaps, timestamp));
    document.getElementById('dl-log-btn').addEventListener('click',  () => downloadLogCSV(data.rows, timestamp));

    const logEl  = document.getElementById('log-section');
    const logBtn = document.getElementById('view-log-btn');
    logBtn.addEventListener('click', () => {
      const visible = logEl.classList.toggle('visible');
      logBtn.textContent = visible ? 'Hide Log' : 'View Log';
    });
  }

  setupZone('zone-tx',   'file-tx',   'name-tx',   'tx');
  setupZone('zone-bank', 'file-bank', 'name-bank', 'bank');
  document.getElementById('run-btn').addEventListener('click', reconcile);
</script>
</body>
</html>
